services:
  api:
    container_name: evolution_api
    build: .
    restart: always
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env
    expose:
      - "${SERVER_PORT}"

volumes:
  evolution_instances:


networks:
  evolution-net:
    name: evolution-net
    driver: bridge
